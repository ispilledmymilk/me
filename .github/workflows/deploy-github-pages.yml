# Deploy Astro static site to GitHub Pages.
#
# REQUIRED (one-time) or deploy step returns 404 "Failed to create deployment":
# 1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions" (NOT "Deploy from a branch").
# 2. Repo → Settings → Actions → General → Workflow permissions:
#    choose "Read and write permissions" (or keep default if your org allows workflow `permissions:` below).
# 3. Free GitHub: Pages from Actions works for public repos; private repos need a paid plan for Pages.
#
# Site: https://ispilledmymilk.github.io/me/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
